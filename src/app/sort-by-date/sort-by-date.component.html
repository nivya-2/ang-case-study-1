
   <button mat-button [matMenuTriggerFor]="sortMenu" class="sort-btn">
    <div class="sort-content">
      <mat-icon class="material-icons">tune</mat-icon>
      <span class="label">Sort by Date</span>
      <mat-icon class="material-icons" >arrow_drop_down</mat-icon>    </div>
  </button>
  
  <mat-menu #sortMenu="matMenu">
    <button mat-menu-item (click)="sort('asc')">Oldest First</button>
    <button mat-menu-item (click)="sort('desc')">Newest First</button>
  </mat-menu>
